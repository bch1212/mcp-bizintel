runtime: "remote"
remoteUrl: "https://mcp-bizintel-production.up.railway.app/mcp"
configSchema:
  type: object
  properties:
    apiKey:
      type: string
      title: BizIntel API Key
      description: "Free dev key: bizintel-dev-key-001 (20 calls/24h). Pro at https://mcpize.com/bizintel-mcp"
